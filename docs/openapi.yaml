      tags: [logistics]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      x-required-permission: "logistics.edit"
      x-is-write: true
      responses: { "200": { description: Remitted } }
  /logistics/pod-collections/{id}/reconcile:
    post:
      summary: Reconcile a remitted POD collection (manager)
      tags: [logistics]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      x-required-permission: "logistics.approve"
      x-is-write: true
      responses: { "200": { description: Reconciled } }

  # ── Public delivery tracking (served at /api/public/tracking — no auth) ──
  /tracking/{token}:
    get:
      summary: "PUBLIC: track a delivery by token (served at /api/public/tracking/{token})"
      tags: [logistics, public]
      security: []
      parameters: [{ name: token, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: Status + state history }, "404": { $ref: "#/components/responses/NotFound" } }

  # ── Public (no auth) — served under /api/public, not /api/v1 ──────
  /sale/{slug}:
    get:
      summary: "[public] Campaign landing payload (before/live/ended)"
      security: []
      tags: [sales_campaigns_public]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Landing payload }
        "404": { $ref: "#/components/responses/NotFound" }
  /sale/{slug}/stock:
    get:
      summary: "[public] Live stock counters"
      security: []
      tags: [sales_campaigns_public]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses: { "200": { description: Stock counters } }
  /sale/{slug}/signup:
    post:
      summary: "[public] Pre-launch notification signup (rate-limited)"
      security: []
      tags: [sales_campaigns_public]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignSignup" }
      responses:
        "201": { description: Signed up }
        "200": { description: Already signed up }
        "429": { description: Too many requests }

