openapi: 3.1.0
info:
  title: Pixie Girl Hub API
  version: 1.0.0
  description: |
    Backend API for the Pixie Girl Hub — multi-entity ERP/CRM/E-commerce platform.
    See ARCHITECTURE.md and API_CONVENTIONS.md in the same folder.

  contact:
    name: JBS Praxis
servers:
  - url: https://api.pixiegirlhub.com/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local dev

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    BrandContext:
      name: X-Brand-Context
      in: header
      required: true
      schema:
        type: string
        enum: [pixiegirl, faitlynhair]
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Input validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        request_id:
          type: string
    ValidationError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [VALIDATION_ERROR]
            message:
              type: string
            fields:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
        request_id:
          type: string
    CampaignCreate:
      type: object
      required: [name, slug, starts_at, ends_at, discount_type, discount_value]
      properties:
        name: { type: string }
        slug: { type: string, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" }
        description: { type: string }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        discount_type:
          type: string
          enum: [percentage, fixed_amount, buy_x_get_y, bundle, free_shipping]
        discount_value:
          type: number
          description: "Fraction for percentage (0.20 = 20%); NGN amount otherwise."
        min_order_value_ngn: { type: number }
        customer_segment_id: { type: string, format: uuid }
        first_time_buyers_only: { type: boolean }
        product_scope:
          type: string
          enum: [all, specific_products, specific_categories]
        landing_hero_title: { type: string }
        landing_hero_subtitle: { type: string }
        landing_hero_image_url: { type: string, format: uri }
        landing_cta_text: { type: string }
        landing_blocks: { type: array, items: { type: object } }
        total_usage_limit: { type: integer }
    CampaignSignup:
      type: object
      properties:
        email: { type: string, format: email }
        phone: { type: string }
        notify_via: { type: string, enum: [email, whatsapp, sms, both] }
        source: { type: string }
      description: "email or phone is required"

    # ── Shared envelopes ────────────────────────────────────────
    # Every read returns { data: ... }; list reads return { data: [...], meta }.
    ListMeta:
      type: object
      properties:
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
        has_more: { type: boolean }

    # ── Logistics & Delivery (Module 6.10) — request schemas (mirror Zod) ──
    CourierCreate:
      type: object
      required: [courier_key, display_name]
      properties:
        courier_key: { type: string, maxLength: 40 }
        display_name: { type: string, maxLength: 120 }
        description: { type: string }
        integration_type: { type: string, enum: [manual, api, webhook_only, partner_portal] }
        api_endpoint: { type: string }
        webhook_secret: { type: string }
        serves_local: { type: boolean }
        serves_nationwide: { type: boolean }
        serves_international: { type: boolean }
        service_countries: { type: array, items: { type: string, maxLength: 3 } }
        rate_card: { type: object, additionalProperties: true }
        supports_pod: { type: boolean }
        pod_fee_pct: { type: number, minimum: 0, maximum: 100 }
        default_packaging: { type: string }
        display_order: { type: integer }
    CourierUpdate:
      description: "All CourierCreate fields except courier_key (all optional) + is_active."
      type: object
      properties:
        display_name: { type: string }
        description: { type: string }
        integration_type: { type: string, enum: [manual, api, webhook_only, partner_portal] }
        api_endpoint: { type: string }
        webhook_secret: { type: string }
        serves_local: { type: boolean }
        serves_nationwide: { type: boolean }
        serves_international: { type: boolean }
        service_countries: { type: array, items: { type: string } }
        rate_card: { type: object, additionalProperties: true }
        supports_pod: { type: boolean }
        pod_fee_pct: { type: number }
        default_packaging: { type: string }
        display_order: { type: integer }
        is_active: { type: boolean }
    DeliveryItem:
      type: object
      required: [description, quantity]
      properties:
        source_type: { type: string }
        source_id: { type: string, format: uuid }
        variant_id: { type: string, format: uuid }
        description: { type: string }
        quantity: { type: integer, minimum: 1 }
        weight_g: { type: integer }
        stock_movement_id: { type: string, format: uuid }
        notes: { type: string }
    DeliveryCreate:
      type: object
      required: [courier_id, delivery_address_snapshot]
      properties:
        order_id: { type: string, format: uuid }
        delivery_type:
          type: string
          enum: [sales_order, intercompany_transfer, stock_transfer, supplier_return, partner_consignment, sample, other]
        reference_type: { type: string }
        reference_id: { type: string, format: uuid }
        courier_id: { type: string, format: uuid }
        courier_tracking_ref: { type: string }
        courier_tracking_url: { type: string }
        from_location_id: { type: string, format: uuid }
        recipient_contact_id: { type: string, format: uuid }
        recipient_name_snapshot: { type: string }
        recipient_phone_snapshot: { type: string }
        recipient_whatsapp_snapshot: { type: string }
        delivery_address_snapshot: { type: object, additionalProperties: true }
        delivery_instructions: { type: string }
        courier_fee_ngn: { type: number, minimum: 0 }
        is_pay_on_delivery: { type: boolean }
        pod_amount_expected_ngn: { type: number, minimum: 0 }
        weight_g: { type: integer }
        package_count: { type: integer, minimum: 1 }
        declared_value_ngn: { type: number, minimum: 0 }
        items: { type: array, items: { $ref: "#/components/schemas/DeliveryItem" } }
    DeliveryBook:
      type: object
      properties:
        courier_tracking_ref: { type: string }
        courier_tracking_url: { type: string }
        expected_delivery_at: { type: string, format: date-time }
    DeliveryAdvance:
      type: object
      required: [to_status]
      properties:
        to_status:
          type: string
          enum: [picked_up, in_transit, arrived_destination_city, out_for_delivery, delivered, returned_to_sender, lost, damaged]
        notes: { type: string }
        source: { type: string, enum: [user, system, webhook, customer, courier_portal] }
    DeliveryCancel:
      type: object
      properties:
        reason: { type: string }
    DeliveryAttempt:
      type: object
      required: [outcome]
      properties:
        attempted_at: { type: string, format: date-time }
        outcome:
          type: string
          enum: [delivered, recipient_unavailable, address_wrong, recipient_refused, locked_premises, rescheduled, lost_in_transit, damaged, other_failure]
        outcome_notes: { type: string }
        rider_name: { type: string }
        rider_phone: { type: string }
        reported_lat: { type: number, minimum: -90, maximum: 90 }
        reported_lng: { type: number, minimum: -180, maximum: 180 }
        webhook_event_id: { type: string, format: uuid }
    DeliveryProof:
      type: object
      required: [proof_type]
      properties:
        proof_type: { type: string, enum: [photo_at_door, signature, recipient_id_photo, sms_otp_confirmed, call_confirmed] }
        document_id: { type: string, format: uuid }
        delivery_attempt_id: { type: string, format: uuid }
        recipient_name: { type: string }
        recipient_id_type: { type: string }
        recipient_id_last4: { type: string }
        otp_code_used: { type: string }
        notes: { type: string }
    CourierWebhookIngest:
      type: object
      required: [courier_id, external_event_type, payload, signature_valid]
      properties:
        courier_id: { type: string, format: uuid }
        delivery_id: { type: string, format: uuid }
        external_event_type: { type: string }
        external_event_id: { type: string }
        mapped_to_status: { type: string }
        payload: { type: object, additionalProperties: true }
        signature_valid: { type: boolean }
        shared_webhook_id: { type: string, format: uuid }
    PodCreate:
      type: object
      required: [delivery_id]
      properties:
        delivery_id: { type: string, format: uuid }
        expected_amount_ngn: { type: number, minimum: 0 }
        courier_fee_ngn: { type: number, minimum: 0 }
        notes: { type: string }
    PodCollected:
      type: object
      required: [collected_amount_ngn]
      properties:
        collected_amount_ngn: { type: number, minimum: 0 }
    PodRemit:
      type: object
      properties:
        collected_amount_ngn: { type: number, minimum: 0 }
        remitted_reference: { type: string }
    PodReconcile:
      type: object
      properties:
        status: { type: string, enum: [reconciled, disputed, short_paid, written_off] }
        notes: { type: string }
    Courier:
      type: object
      properties:
        courier_id: { type: string, format: uuid }
        courier_key: { type: string }
        display_name: { type: string }
        integration_type: { type: string }
        serves_local: { type: boolean }
        serves_nationwide: { type: boolean }
        serves_international: { type: boolean }
        service_countries: { type: array, items: { type: string } }
        rate_card: { type: object, additionalProperties: true }
        supports_pod: { type: boolean }
        pod_fee_pct: { type: number, nullable: true }
        is_active: { type: boolean }
        display_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Delivery:
      type: object
      properties:
        delivery_id: { type: string, format: uuid }
        delivery_number: { type: string }
        order_id: { type: string, format: uuid, nullable: true }
        delivery_type: { type: string }
        courier_id: { type: string, format: uuid }
        courier_tracking_ref: { type: string, nullable: true }
        courier_tracking_url: { type: string, nullable: true }
        recipient_name_snapshot: { type: string, nullable: true }
        delivery_address_snapshot: { type: object, additionalProperties: true }
        courier_fee_ngn: { type: number }
        is_pay_on_delivery: { type: boolean }
        pod_amount_expected_ngn: { type: number, nullable: true }
        status:
          type: string
          enum: [queued, booked, picked_up, in_transit, arrived_destination_city, out_for_delivery, attempted_failed, delivered, returned_to_sender, lost, damaged, cancelled]
        attempt_count: { type: integer }
        public_tracking_token: { type: string, nullable: true }
        booked_at: { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    DeliveryDetail:
      allOf:
        - $ref: "#/components/schemas/Delivery"
        - type: object
          properties:
            items: { type: array, items: { type: object, additionalProperties: true } }
            attempts: { type: array, items: { type: object, additionalProperties: true } }
            history: { type: array, items: { type: object, additionalProperties: true } }
            proofs: { type: array, items: { type: object, additionalProperties: true } }
    PodCollection:
      type: object
      properties:
        collection_id: { type: string, format: uuid }
        collection_number: { type: string }
        delivery_id: { type: string, format: uuid }
        courier_id: { type: string, format: uuid }
        expected_amount_ngn: { type: number }
        collected_amount_ngn: { type: number, nullable: true }
        courier_fee_ngn: { type: number }
        net_to_us_ngn: { type: number }
        variance_ngn: { type: number }
        status:
          type: string
          enum: [pending, collected_by_courier, remitted, reconciled, disputed, short_paid, written_off]
        remitted_reference: { type: string, nullable: true }
        sales_order_payment_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
    DeliveryTracking:
      type: object
      properties:
        delivery_number: { type: string }
        status: { type: string }
        courier_tracking_ref: { type: string, nullable: true }
        courier_tracking_url: { type: string, nullable: true }
        expected_delivery_at: { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        recipient_name_snapshot: { type: string, nullable: true }
        history:
          type: array
          items:
            type: object
            properties:
              to_status: { type: string }
              changed_at: { type: string, format: date-time }
              notes: { type: string, nullable: true }

paths:
  /auth/login:
    post:
      summary: Login with email + password
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Logged in
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Sales Campaigns (Module 6.22) ───────────────────────────────
  /sales-campaigns:
    get:
      summary: List campaigns
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: status,
            in: query,
            schema: { type: string },
            description: "comma-separated status filter",
          }
        - { name: q, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - {
            name: page_size,
            in: query,
            schema: { type: integer, default: 25, maximum: 100 },
          }
      x-required-permission: "sales_campaigns.view"
      x-entity-scope: brand
      x-is-write: false
      x-ai-enabled: false
      responses:
        "200": { description: A page of campaigns }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      summary: Create a campaign (draft)
      tags: [sales_campaigns]
      parameters: [{ $ref: "#/components/parameters/BrandContext" }]
      x-required-permission: "sales_campaigns.create"
      x-entity-scope: brand
      x-is-write: true
      x-ai-enabled: false
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignCreate" }
      responses:
        "201": { description: Created }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: Slug already in use }

  /sales-campaigns/{id}:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      summary: Get a campaign (with products + rollups)
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.view"
      x-entity-scope: brand
      x-is-write: false
      responses:
        "200": { description: Campaign detail }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update a campaign (draft/scheduled/paused only)
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.edit"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Updated }
        "409": { description: Invalid state for edit }
    delete:
      summary: Archive a campaign
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.delete"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "204": { description: Archived }

  /sales-campaigns/{id}/submit:
    post:
      summary: Submit a draft campaign for approval (opens workflow)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.edit"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Now pending_approval }
        "409": { description: Not in draft state }

  /sales-campaigns/{id}/approve:
    post:
      summary: Approve a pending campaign (CEO/manager)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.approve"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Approved → scheduled }

  /sales-campaigns/{id}/reject:
    post:
      summary: Reject a pending campaign (back to draft)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.approve"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Rejected → draft }

  /sales-campaigns/{id}/launch:
    post:
      summary: Manually launch an approved campaign (→ live)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.edit"
      x-entity-scope: brand
      x-is-write: true
      responses:
        "200": { description: Live }
        "409": { description: Not approved / wrong state }

  /sales-campaigns/{id}/pause:
    post:
      {
        summary: Pause a live campaign,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.edit",
        x-is-write: true,
        responses: { "200": { description: Paused } },
      }
  /sales-campaigns/{id}/resume:
    post:
      {
        summary: Resume a paused campaign,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.edit",
        x-is-write: true,
        responses: { "200": { description: Live } },
      }
  /sales-campaigns/{id}/end:
    post:
      {
        summary: End a campaign early,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.edit",
        x-is-write: true,
        responses: { "200": { description: Ended } },
      }
  /sales-campaigns/{id}/duplicate:
    post:
      {
        summary: Clone a campaign into a new draft,
        tags: [sales_campaigns],
        parameters:
          [
            { $ref: "#/components/parameters/BrandContext" },
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        x-required-permission: "sales_campaigns.create",
        x-is-write: true,
        responses: { "201": { description: New draft } },
      }

  /sales-campaigns/{id}/products:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      summary: List campaign products (include/exclude)
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.view"
      responses: { "200": { description: Product links } }
    post:
      summary: Add an include/exclude product or category
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.edit"
      x-is-write: true
      responses: { "201": { description: Added } }

  /sales-campaigns/{id}/products/{linkId}:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
      - {
          name: linkId,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    patch:
      summary: Update a campaign product link
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.edit"
      x-is-write: true
      responses: { "200": { description: Updated } }
    delete:
      summary: Remove a campaign product link
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.edit"
      x-is-write: true
      responses: { "204": { description: Removed } }

  /sales-campaigns/{id}/landing:
    parameters:
      - $ref: "#/components/parameters/BrandContext"
      - {
          name: id,
          in: path,
          required: true,
          schema: { type: string, format: uuid },
        }
    get:
      summary: Get landing-page config
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.view"
      responses: { "200": { description: Landing config } }
    patch:
      summary: Update landing-page config
      tags: [sales_campaigns]
      x-required-permission: "sales_campaigns.edit"
      x-is-write: true
      responses: { "200": { description: Updated } }

  /sales-campaigns/{id}/preview:
    get:
      summary: Render landing payload for a given state (admin preview)
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: state,
            in: query,
            schema: { type: string, enum: [before, live, ended] },
          }
      x-required-permission: "sales_campaigns.view"
      responses: { "200": { description: Landing payload } }

  /sales-campaigns/{id}/share-kit:
    get:
      summary: Pre-formatted social/WhatsApp/email copy + UTM links
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          }
      x-required-permission: "sales_campaigns.view"
      responses: { "200": { description: Share kit } }

  /sales-campaigns/{id}/signups:
    get:
      summary: List pre-launch notification signups
      tags: [sales_campaigns]
      parameters:
        - $ref: "#/components/parameters/BrandContext"
